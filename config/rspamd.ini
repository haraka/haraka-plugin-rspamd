;host = localhost
;port = 11333
;scheme = http
;path = /checkv2
;unix_socket = /path/to/your/rspamd-client.sock
;add_headers = sometimes

[tls]
;reject_unauthorized = true
;servername = rspamd.example.com
;ca_file = /path/to/ca.pem
;cert_file = /path/to/client-cert.pem
;key_file = /path/to/client-key.pem

[auth]
;basic_user = user
;basic_pass = password
;header = Authorization
;value = Bearer token
;value_env = RSPAMD_AUTH_HEADER

[request]
;settings_id = uribl
;settings = {"groups_enabled":["surbl"]}
;flags = groups,milter
;ext_urls = true
;pass_all = false
;raw = false
;url_format = extended

[request_headers]
;MTA-Tag = outbound
;X-API-Key = abc123

[dkim]
;enabled = true

[header]
bar = X-Rspamd-Bar
report = X-Rspamd-Report
score = X-Rspamd-Score

[check]
;authenticated=false
;private_ip=false
;local_ip=false
;relay=false

[reject]
;message = Detected as spam
;authenticated=false
;spam = true

[rmilter_headers]
;enabled = true

[spambar]
;positive = +
;negative = -
;neutral = /
